<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Bryan's Café</title>
    <meta name="description" content="Explore the delicious meals and beverages offered at Bryan's Café.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Images/coffee%20Logo.jpg" alt="Bryan's Café Logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">About</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="menu-container">
            <h1 class="section-title">Our Menu</h1>
            
            <div class="menu-section" id="meals-section">
                <h2>Meals</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Description</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="meals-body">
                        <!-- Meals will be loaded here dynamically -->
                    </tbody>
                </table>
            </div>

            <div class="menu-section" id="beverages-section">
                <h2>Beverages</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Item Name</th>
                            <th>Description</th>
                            <th>Price</th>
                        </tr>
                    </thead>
                    <tbody id="beverages-body">
                        <!-- Beverages will be loaded here dynamically -->
                    </tbody>
                </table>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Bryan's Café. All rights reserved.</p>
        <p><a href="privacy.html" target="_blank">Privacy Policy</a></p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
