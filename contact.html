<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Bryan's Café</title>
    <meta name="description" content="Get in touch with Bryan's Café or find one of our branch locations.">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <div class="logo">
            <a href="index.html">
                <img src="Images/coffee%20Logo.jpg" alt="Bryan's Café Logo">
            </a>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">About</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h1 class="section-title">Get in Touch</h1>
            <div class="contact-container">
                
                <!-- Enquiry Form Section -->
                <div class="enquiry-form">
                    <h2>Send an Enquiry</h2>
                    <div id="notification" class="notification">Your message has been sent successfully!</div>
                    <form id="contactForm">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required>
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" required>
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit">Submit Enquiry</button>
                    </form>
                </div>

                <!-- Branches Section -->
                <div class="branch-locations">
                    <h2>Our Branches</h2>
                    <div id="branches-container">
                        <!-- Branch cards will be injected here dynamically -->
                    </div>
                </div>

            </div>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="current-year"></span> Bryan's Café. All rights reserved.</p>
        <p><a href="privacy.html" target="_blank">Privacy Policy</a></p>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/contact.js"></script>
</body>
</html>
